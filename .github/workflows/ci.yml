# ═══════════════════════════════════════════════════════════════
#  CI Pipeline — Data-Driven Customer Retention
# ═══════════════════════════════════════════════════════════════
#
#  Runs on every push and pull request to main.
#  Jobs:
#    1. code-quality  — Linting (flake8) + formatting check (black)
#    2. tests         — Unit & integration tests (pytest)
#
# ═══════════════════════════════════════════════════════════════

name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  # ── Job 1: Code Quality ───────────────────────────────────
  code-quality:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 black isort

      - name: Run isort (import sorting check)
        run: python -m isort --check-only --diff .

      - name: Run Black (format check)
        run: python -m black --check .

      - name: Run Flake8 (linting)
        run: python -m flake8 .

  # ── Job 2: Tests ──────────────────────────────────────────
  tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: code-quality  # Only run tests if code quality passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry install --with dev

      - name: Run unit tests
        run: poetry run pytest tests/ -v --tb=short --ignore=tests/test_integration.py

      - name: Run integration tests
        run: poetry run pytest tests/test_integration.py -v --tb=short

      - name: Run full test suite
        run: poetry run pytest tests/ -v --tb=short
